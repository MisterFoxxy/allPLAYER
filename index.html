<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список игроков</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn-container,
    .actions,
    .filter-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background: #D96B1C;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .btn.active {
      box-shadow: 0 0 0 2px #000 inset;
    }

    .btn:hover {
      background: #C36019;
    }

    .filter-container label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
    }

    .filter-container input {
      padding: 4px 8px;
      font-size: 14px;
      width: 90px;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f4f4f4;
      cursor: pointer;
    }

    .msg {
      margin-top: 15px;
      text-align: center;
      color: #666;
      font-style: italic;
    }

    .err {
      margin-top: 15px;
      text-align: center;
      color: #b00020;
      font-weight: bold;
      white-space: pre-wrap;
    }

    .tag-box, .url-box {
      margin-top: 10px;
      text-align: center;
      color: #333;
      font-size: 14px;
      word-break: break-all;
    }

    .tag-box code, .url-box code {
      background: #f4f4f4;
      padding: 3px 6px;
      border-radius: 4px;
    }

    .url-box a {
      color: #1a5fb4;
    }

    @media (max-width: 480px) {
      body {
        font-size: 12px;
        padding: 10px;
      }

      th, td {
        padding: 4px;
        font-size: 10px;
      }

      .btn {
        flex: 1 1 auto;
        min-width: 90px;
      }

      .filter-container {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-container label {
        justify-content: space-between;
      }

      .filter-container input {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <h2>Список игроков</h2>

  <div class="btn-container">
    <button class="btn active" id="btn-fshr">Список ФШР</button>
    <button class="btn" id="btn-rsht">Список РШТ</button>
  </div>

  <div class="filter-container">
    <label>Год от: <input type="number" id="filter-year-min" placeholder="2010"></label>
    <label>до: <input type="number" id="filter-year-max" placeholder="2017"></label>
    <label>Рейтинг от: <input type="number" id="filter-rt-min" placeholder="0"></label>
    <label>до: <input type="number" id="filter-rt-max" placeholder="3000"></label>
    <button class="btn" id="btn-apply">Фильтровать</button>
    <button class="btn" id="btn-reset">Сбросить</button>
  </div>

  <div class="actions">
    <button class="btn" id="btn-open">Проверить / открыть запрос Bitrix</button>
    <button class="btn" id="btn-send">Отправить этих в Bitrix</button>
    <button class="btn" id="btn-csv">Скачать CSV</button>
  </div>

  <div class="tag-box">
    Текущий tag для Bitrix: <code id="currentTag">—</code>
  </div>

  <div class="url-box">
    Ссылка запроса: <a id="requestLink" href="#" target="_blank" rel="noopener noreferrer">открыть</a><br>
    <code id="requestUrl">—</code>
  </div>

      </tr>
    </thead>
    <tbody></tbody>
  </table>

          while (node.firstChild) node.removeChild(node.firstChild);

        function cleanPart(v) {
          return String(v || '')
            .trim()
            .replace(/\s+/g, '')
            .replace(/[^0-9A-Za-z_-]/g, '');
        }

        function getTodayStr() {
          return new Date().toISOString().slice(0, 10);
        }

        function buildBitrixTag() {
          var yMin = document.getElementById('filter-year-min').value.trim();
          var yMax = document.getElementById('filter-year-max').value.trim();
          var rMin = document.getElementById('filter-rt-min').value.trim();
          var rMax = document.getElementById('filter-rt-max').value.trim();

          var parts = ['MAIL', mode, getTodayStr()];

          if (yMin || yMax) {
            parts.push('Y' + cleanPart(yMin || '0') + '-' + cleanPart(yMax || '9999'));
          }

          if (rMin || rMax) {
            parts.push('R' + cleanPart(rMin || '0') + '-' + cleanPart(rMax || '9999'));
          }

          return parts.join('_');
        }

        function applyFilters(arr) {
          var yMin = document.getElementById('filter-year-min').value.trim();
          var yMax = document.getElementById('filter-year-max').value.trim();
          var rMin = document.getElementById('filter-rt-min').value.trim();
          var rMax = document.getElementById('filter-rt-max').value.trim();

          return arr.filter(function (p) {
            var birth = parseInt(String(p.birth || '').trim(), 10);
            if (isNaN(birth)) birth = 0;

            var rt = num(p.rt);

            if (yMin !== '' && birth < parseInt(yMin, 10)) return false;
            if (yMax !== '' && birth > parseInt(yMax, 10)) return false;
            if (rMin !== '' && rt < parseFloat(rMin)) return false;
            if (rMax !== '' && rt > parseFloat(rMax)) return false;

            return true;
          });
        }

        function sortRows(arr) {
          arr.sort(function (a, b) {
            if (sortCol === 'rt') {
              return sortAsc ? num(a.rt) - num(b.rt) : num(b.rt) - num(a.rt);
            }

            if (sortCol === 'birth') {
              var ay = parseInt(a.birth || '0', 10) || 0;
              var by = parseInt(b.birth || '0', 10) || 0;
              return sortAsc ? ay - by : by - ay;
            }

            var av = String(a[sortCol] || '');
            var bv = String(b[sortCol] || '');
            return sortAsc ? av.localeCompare(bv, 'ru') : bv.localeCompare(av, 'ru');
          });

          return arr;
        }

        function buildRequestUrl() {
          var ids = Array.from(new Set(
            currentView.map(function (p) { return p.contactId; }).filter(Boolean)
          ));

          var tag = buildBitrixTag();

          if (!ids.length) return '';

          return (
            markWebappUrl +
            '?mode=' + encodeURIComponent(mode) +
            '&tag=' + encodeURIComponent(tag) +
            '&contacts=' + encodeURIComponent(ids.join(','))
          );
        }

        function updateRequestUi() {
          var tag = buildBitrixTag();
          currentTagBox.textContent = tag;

          var url = buildRequestUrl();
          if (url) {
            requestLink.href = url;
            requestUrlBox.textContent = url;
          } else {
            requestLink.href = '#';
            requestUrlBox.textContent = 'Нет CONTACT_ID в текущем отборе';
          }
        }

        function render() {
          err.textContent = '';
          msg.textContent = '';
          clearNode(tbody);

          var arr = Array.isArray(data[mode]) ? data[mode].slice() : [];
          arr = applyFilters(arr);
          arr = sortRows(arr);
          currentView = arr;

          ratingHeader.textContent = mode === 'FSHR' ? 'Рейтинг ФШР' : 'Рейтинг РШТ';

          if (!arr.length) {
            updateRequestUi();
            msg.textContent = 'Нет игроков по текущему фильтру';
            return;
          }

          arr.forEach(function (p, i) {
            var tr = document.createElement('tr');

            var td1 = document.createElement('td');
            td1.textContent = String(i + 1);

            var td2 = document.createElement('td');
            td2.textContent = p.fullName || '';

            var td3 = document.createElement('td');
            td3.textContent = p.birth || '';

            var td4 = document.createElement('td');
            td4.textContent = p.rt || '';

            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);

            tbody.appendChild(tr);
          });

          updateRequestUi();
        }

        function setMode(newMode) {
          mode = newMode;
          sortCol = 'rt';
          sortAsc = false;

          document.getElementById('btn-fshr').classList.toggle('active', mode === 'FSHR');
          document.getElementById('btn-rsht').classList.toggle('active', mode === 'RSHT');

          render();
        }

        function csvEscape(v) {
          return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
        }

        function downloadCsv() {
          if (!currentView.length) {
            alert('Нет игроков в текущем отборе');
            return;
          }

          var tag = buildBitrixTag();
          var rows = [];
          rows.push([
            '#',
            'ФИО',
            'Год рождения',
            'Рейтинг',
            'CONTACT_ID',
            'DEAL_ID',
            'BITRIX_TAG'
          ]);

          currentView.forEach(function (p, i) {
            rows.push([
              i + 1,
              p.fullName || '',
              p.birth || '',
              p.rt || '',
              p.contactId || '',
              p.dealId || '',
              tag
            ]);
          });

          var csv = rows.map(function (r) {
            return r.map(csvEscape).join(';');
          }).join('\r\n');

          var blob = new Blob(['\uFEFF' + csv], {
            type: 'text/csv;charset=utf-8;'
          });

          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');

          a.href = url;
          a.download = tag + '.csv';

          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          URL.revokeObjectURL(url);
        }

        function openBitrixRequest() {
          var url = buildRequestUrl();

          if (!currentView.length) {
            alert('Нет игроков в текущем отборе');
            return;
          }

          if (!url) {
            alert('Нет CONTACT_ID для отправки');
            return;
          }

          window.open(url, '_blank', 'noopener,noreferrer');
        }

        document.getElementById('btn-fshr').addEventListener('click', function () {
          setMode('FSHR');
        });

        document.getElementById('btn-rsht').addEventListener('click', function () {
          setMode('RSHT');
        });

        document.getElementById('btn-apply').addEventListener('click', function () {
          render();
        });

        document.getElementById('btn-reset').addEventListener('click', function () {
          document.getElementById('filter-year-min').value = '';
          document.getElementById('filter-year-max').value = '';
          document.getElementById('filter-rt-min').value = '';
          document.getElementById('filter-rt-max').value = '';
          render();
        });

        document.getElementById('btn-csv').addEventListener('click', function () {
          downloadCsv();
        });

        document.getElementById('btn-open').addEventListener('click', function () {
          openBitrixRequest();
        });

        document.getElementById('btn-send').addEventListener('click', function () {
          openBitrixRequest();
        });

        var headers = document.querySelectorAll('th[data-col]');
        headers.forEach(function (th) {
          var col = th.getAttribute('data-col');
          if (col === '#') return;

          th.addEventListener('click', function () {
            if (sortCol === col) {
              sortAsc = !sortAsc;
            } else {
              sortCol = col;
              sortAsc = false;
            }
            render();
          });
        });

        render();
      } catch (e) {
        var errBox = document.getElementById('err');
        if (errBox) {
          errBox.textContent = 'Ошибка JS: ' + (e && e.message ? e.message : String(e));
        } else {
          document.body.innerHTML += '<pre style="color:red">Ошибка JS: ' + String(e) + '</pre>';
        }
      }
    })();
  </script>
</body>
</html>
